server:
  port: 8080

spring:
  application:
    name: spring-ai-fly-schedule-custom


  ai:
    ollama:
      base-url: http://ollama.java21.net
      chat:
        options:
          model: qwen2.5:latest
          temperature: 0.0
          timeout: 300s
    google:
      genai:
        api-key: ${GEMINI_API_KEY} # 깃허브 보안을 위해 환경변수로 변경
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.0
            max-output-tokens: 256
            top-p: 0.9
            top-k: 40

logging:
  level:
    com.nhnacademy.springaiflyschedulecustom: DEBUG
    org.springframework.ai: DEBUG