<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI Flight Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        .navbar { background-color: #ffffff; border-bottom: 1px solid #dee2e6; }
        .search-container {
            background: white;
            padding: 40px 0;
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 30px;
        }
        .flight-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            transition: transform 0.2s;
            margin-bottom: 15px;
        }
        .flight-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .airline-logo { font-weight: 800; color: #0d6efd; font-size: 1.1rem; }
        .time-text { font-size: 1.5rem; font-weight: 700; color: #212529; }
        .arrow { color: #adb5bd; font-size: 1.2rem; }
        .price-text { font-size: 1.3rem; font-weight: 800; color: #198754; }
        .airport-label { font-size: 0.85rem; color: #6c757d; }
        #loading { display: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-light">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">✈️ Fly Spring AI</a>
    </div>
</nav>

<div class="search-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h2 class="mb-4 fw-bold">어디로 떠나시나요?</h2>
                <div class="input-group input-group-lg shadow-sm">
                    <input type="text" id="queryInput" class="form-control" placeholder="예: 내일 김포에서 제주 7만원 이하">
                    <button class="btn btn-primary px-4" onclick="searchFlights()">검색</button>
                </div>
                <p class="mt-3 text-muted">AI가 자연어를 분석하여 최적의 항공편을 찾아드립니다.</p>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div id="loading" class="text-center my-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 text-secondary">항공편을 분석 중입니다...</p>
    </div>

    <div id="resultsArea" class="row">
    </div>
</div>

<script>
    async function searchFlights() {
        const query = document.getElementById('queryInput').value;
        if (!query) return;

        const resultsArea = document.getElementById('resultsArea');
        const loading = document.getElementById('loading');

        resultsArea.innerHTML = '';
        loading.style.display = 'block';

        try {
            const response = await fetch(`/api/chatbot/ask?message=${encodeURIComponent(query)}`);
            const result = await response.json();
            loading.style.display = 'none';

            if (!result.success || Object.keys(result.data).length === 0) {
                resultsArea.innerHTML = `
                    <div class="col-12 text-center py-5 text-muted">
                        <h4>검색 결과가 없습니다. 조건을 변경해보세요</h4>
                    </div>`;
                return;
            }

            // 항공사별 데이터 순회
            for (const [airline, flights] of Object.entries(result.data)) {
                flights.forEach(f => {
                    // 시간 데이터 포맷팅 (HH:mm)
                    const depTime = f.depPlandTime.substring(8, 10) + ':' + f.depPlandTime.substring(10, 12);
                    const arrTime = f.arrPlandTime.substring(8, 10) + ':' + f.arrPlandTime.substring(10, 12);
                    const price = f.economyCharge.toLocaleString();

                    const cardHtml = `
                        <div class="col-12">
                            <div class="flight-card p-4 shadow-sm">
                                <div class="row align-items-center text-center text-md-start">
                                    <div class="col-md-2 mb-3 mb-md-0">
                                        <div class="airline-logo">${airline}</div>
                                        <div class="text-muted small">${f.vihicleId}</div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="airport-label text-uppercase">${f.depAirportNm}</div>
                                        <div class="time-text">${depTime}</div>
                                    </div>
                                    <div class="col-md-1 text-center">
                                        <span class="arrow">→</span>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="airport-label text-uppercase">${f.arrAirportNm}</div>
                                        <div class="time-text">${arrTime}</div>
                                    </div>
                                    <div class="col-md-3 text-md-end text-center mt-3 mt-md-0">
                                        <div class="price-text">${price}원</div>
                                        <button class="btn btn-outline-primary btn-sm mt-2">선택하기</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    resultsArea.innerHTML += cardHtml;
                });
            }
        } catch (e) {
            loading.style.display = 'none';
            alert("서버 연결에 실패했습니다.");
        }
    }
</script>
</body>
</html>
